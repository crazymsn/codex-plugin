name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Compile Python
        run: python3 -m compileall scripts

      - name: Run tests
        run: python3 -m unittest discover -s tests

      - name: Check shell wrappers
        run: bash -n scripts/macos-patch.sh scripts/macos-rollback.sh
